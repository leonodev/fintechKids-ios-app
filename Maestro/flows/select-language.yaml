appId: com.fleon.fintechKids
---
- launchApp:
    clearState: true

# ESCUDO ANTI-POPUPS: Si no aparecen, Maestro los ignora y continúa
- tapOn:
    text: "Allow"
    optional: true
    timeout: 3000

- tapOn:
    text: "Permitir"
    optional: true
    timeout: 3000

# --- AHORA TU TEST CONTINÚA DE FORMA NORMAL ---

# Subimos a 30000ms (30s) para soportar el arranque en frío de la CI
- extendedWaitUntil:
    visible:
        id: "select_language_title_id"
    timeout: 30000

# Pulsamos el botón del menú
- tapOn:
    id: "menu_selected_language_id"

# Subimos a 10000ms (10s) por si la animación de las banderas va lenta en la CI
- extendedWaitUntil:
    visible:
        id: "option_language_id"
    timeout: 10000

# Seleccionamos el idioma del ForEach
- tapOn:
    id: "option_language_id"

# Avanzamos en el flujo usando el botón
- tapOn:
    id: "btn_language_continue_id"