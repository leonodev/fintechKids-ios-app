appId: com.fleon.fintechKids
---
- launchApp:
    appId: com.fleon.fintechKids
    clearState: false

# Solo esperar por el título de idioma, sin depender de Lottie IDs
- extendedWaitUntil:
    visible:
      id: "select_language_title_id"
    timeout: 60000

- tapOn:
    id: "menu_selected_language_id"