appId: com.fleon.fintechKids
---
- launchApp:
    appId: com.fleon.fintechKids
    clearState: true


# Dar tiempo a que cargue lo que sea
- waitForAnimationToEnd

# Captura 1: nada más abrir
- takeScreenshot: screenshots/01-nada-mas-abrir


# Esperar 5 segundos por si hay popups
- swipe:
    direction: UP

# Captura 2: después de 5 segundos
- takeScreenshot: screenshots/02-despues-de-5-segundos
