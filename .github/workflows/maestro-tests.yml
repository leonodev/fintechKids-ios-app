name: Maestro UI Tests

# 🎯 El disparador: Se ejecuta cada vez que se abre o actualiza un PR hacia main
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  e2e-testing:
    # Obligatorio usar macOS para poder levantar el simulador de Xcode
    runs-on: macos-latest

    steps:
      # 1. Clonar el código del repositorio en la máquina virtual
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Encender el simulador de iOS de forma dinámica
      - name: Boot iOS Simulator
        run: |
          # Extraemos estrictamente el UUID usando una expresión regular pura
          UUID=$(xcrun simctl list devices available | grep "iPhone" | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' | head -n 1)
          
          if [ -z "$UUID" ]; then
            echo "❌ Error: No se encontró ningún simulador de iPhone disponible en este Mac de GitHub."
            exit 1
          fi
          
          echo "🎯 ¡Simulador detectado con éxito! UUID: $UUID"
          echo "📱 Encendiendo el dispositivo..."
          xcrun simctl boot $UUID
          
          echo "⏳ Esperando a que el sistema operativo termine de arrancar..."
          xcrun simctl bootstatus $UUID

      # 3. Instalar la herramienta CLI de Maestro
      - name: Install Maestro CLI
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          # Añadimos Maestro a las variables de entorno globales de GitHub
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 4. Limpieza inicial en Supabase usando tus Secrets seguros
      - name: Clean Supabase Test User
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -s -X DELETE "${SUPABASE_URL}/rest/v1/fhk_family_members?member_name=eq.user_test_e2e" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"

      # 5. Compilar la App e instalarla en el simulador encendido
      - name: Build and Install App
        run: |
          UUID=$(xcrun simctl list devices available | grep "iPhone" | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' | head -n 1)
          
          echo "🔄 1. Descargando paquetes directamente en el directorio 'build'..."
          xcodebuild -resolvePackageDependencies \
                     -project fintechKids.xcodeproj \
                     -scheme FintechKids-Pro \
                     -derivedDataPath build \
                     -disablePackageRepositoryCache
          
          echo "🪓 2. Modificando código en vivo (Firebase y Design System)"
          FIREBASE_FILE="build/SourcePackages/checkouts/fintechKids-modulo-firebase-ios/Sources/FHKFirebase/RemoteConfig/FHKRemoteConfigService.swift"
          DS_PROTOCOL="build/SourcePackages/checkouts/fintechKids-modulo-designsystem-ios/Sources/FHKDesignSystem/Components/Views/Buttons/Base/FHKButtonProtocol.swift"
          DS_CIRCLE="build/SourcePackages/checkouts/fintechKids-modulo-designsystem-ios/Sources/FHKDesignSystem/Components/Views/Buttons/Types/FHKButtonCircle.swift"
          
          # Fix Firebase
          if [ -f "$FIREBASE_FILE" ]; then
            sed -i '' 's/remoteConfig\.fetchAndActivate()/RemoteConfig.remoteConfig().fetchAndActivate()/g' "$FIREBASE_FILE"
            echo "✅ Firebase parchado."
          fi
          
          # Fix Design System (Cambiamos el tipo de retorno 'Glass' por 'some View')
          if [ -f "$DS_PROTOCOL" ]; then
            sed -i '' 's/-> Glass {/-> some View {/g' "$DS_PROTOCOL"
            echo "✅ Protocolo de Diseño parchado."
          fi
          
          if [ -f "$DS_CIRCLE" ]; then
            sed -i '' 's/-> Glass {/-> some View {/g' "$DS_CIRCLE"
            echo "✅ Botón Círculo de Diseño parchado."
          fi
          
          echo "🏗️ 3. Compilando con xcodebuild para el simulador: $UUID"
          xcodebuild -project fintechKids.xcodeproj \
                     -scheme FintechKids-Pro \
                     -destination "platform=iOS Simulator,id=$UUID" \
                     -configuration Debug \
                     -derivedDataPath build \
                     ONLY_ACTIVE_ARCH=YES \
                     -disablePackageRepositoryCache
          
          # Buscamos el binario e instalamos
          APP_PATH=$(find build -name "FintechKids.app" | head -n 1)
          xcrun simctl install booted "$APP_PATH"

      # 6. Ejecución de los flujos de Maestro
      - name: Run Maestro Tests
        run: |
          export MAESTRO_DRIVER_STARTUP_TIMEOUT=300000
          maestro test --format html-detailed --output report.html \
            Maestro/flows/select-language.yaml \
            Maestro/flows/make-login.yaml \
            Maestro/flows/create-new-member.yaml

      # 7. Guardar el reporte HTML en GitHub (Se ejecuta pase lo que pase: Éxito o Fallo)
      - name: Upload Maestro Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-html-report
          path: report.html
