name: Maestro UI Tests

# рџЋЇ El disparador: Se ejecuta cada vez que se abre o actualiza una IT hacia main
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  e2e-testing:
    # Obligatorio usar macOS para poder levantar el simulador de Xcode
    runs-on: macos-15

    steps:
      # 1. Clonar el cГіdigo del repositorio en la mГЎquina virtual
      - name: Checkout code
        uses: actions/checkout@v4

      # рџ”Ќ Verificar Versiones Exactas de CompilaciГіn
      - name: рџ”Ќ Verificar Versiones Exactas de CompilaciГіn
        run: |
          echo "=== VersiГіn de macOS ==="
          sw_vers
          echo "=== VersiГіn de Xcode ==="
          xcodebuild -version
          echo "=== VersiГіn de Swift ==="
          swift --version
          echo "=== SDKs Disponibles ==="
          xcodebuild -showsdks

     # 2. Encender el simulador de iOS de forma dinГЎmica y registrar su UUID global
      - name: Boot iOS Simulator
        run: |
          UUID=$(xcrun simctl list devices available | grep "iPhone" | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' | head -n 1)
          
          if [ -z "$UUID" ]; then
            echo "вќЊ Error: No se encontrГі ningГєn simulador de iPhone disponible en este runner."
            exit 1
          fi
          
          echo "рџЋЇ ВЎSimulador detectado! UUID: $UUID"
          
          xcrun simctl boot "$UUID"
          xcrun simctl bootstatus "$UUID"
          
          # вљЎпёЏ EL TRUCO: Desactivar animaciones del sistema para evitar que XCTest se congele esperando idleness
          xcrun simctl spawn "$UUID" defaults write com.apple.springboard WindowAnimationScale -float 0.0
          
          sleep 40
          
          echo "TARGET_SIMULATOR_UUID=$UUID" >> $GITHUB_ENV

      # 3. Instalar la herramienta CLI de Maestro
      - name: Install Maestro CLI
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          # AГ±adimos Maestro a las variables de entorno globales de GitHub
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 4. Limpieza inicial en Supabase usando tus Secrets seguros
      - name: Clean Supabase Test User
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -s -X DELETE "${SUPABASE_URL}/rest/v1/fhk_family_members?member_name=eq.user_test_e2e" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"

      - name: рџ”“ Unlock macOS Keychain for Simulator
        run: |
          security unlock-keychain -p "" login.keychain || true
          security set-keychain-settings -lut 7200 login.keychain || true

      # 5. Compilar la App e instalarla en el simulador de la CI
      - name: Build and Install App
        run: |
          echo "рџ”„ 1. Descargando paquetes..."
          xcodebuild -resolvePackageDependencies \
                     -project fintechKids.xcodeproj \
                     -scheme FintechKids-Pro \
                     -derivedDataPath build \
                     -disablePackageRepositoryCache
          
          echo "рџЄ“ 2. Aplicando parches de compatibilidad..."
          FIREBASE_FILE="build/SourcePackages/checkouts/fintechKids-modulo-firebase-ios/Sources/FHKFirebase/RemoteConfig/FHKRemoteConfigService.swift"
          if [ -f "$FIREBASE_FILE" ]; then
            sed -i '' 's/remoteConfig\.fetchAndActivate()/RemoteConfig.remoteConfig().fetchAndActivate()/g' "$FIREBASE_FILE"
          fi
          
          DS_PATH="build/SourcePackages/checkouts/fintechKids-modulo-designsystem-ios/Sources/FHKDesignSystem"
          if [ -d "$DS_PATH" ]; then
            find "$DS_PATH" -name "*.swift" -type f -exec sed -i '' 's/iOS 26.0/iOS 17.0/g' {} +
          fi
          
          echo "рџЏ—пёЏ 3. Compilando en modo Debug (para salvar la CPU del runner)..."
          xcodebuild -project fintechKids.xcodeproj \
                     -scheme FintechKids-Pro \
                     -destination "platform=iOS Simulator,id=${{ env.TARGET_SIMULATOR_UUID }}" \
                     -configuration Debug \
                     -derivedDataPath build \
                     -quiet \
                     ARCHS=arm64 \
                     ONLY_ACTIVE_ARCH=YES \
                     COMPRESS_PNG_FILES=NO \
                     ASSETCATALOG_COMPILER_OPTIMIZATION=none \
                     -disablePackageRepositoryCache \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SWIFT_STRICT_CONCURRENCY=minimal \
                     SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
                     IDEBuildOperationMaxNumberOfConcurrentCompileTasks=2 \
                     SWIFT_EXEC_MAX_JOBS=2
          
          echo "рџљЂ 4. Instalando la App en el simulador objetivo..."
          APP_PATH=$(find build -iname "fintechKids.app" | head -n 1)
          xcrun simctl install "${{ env.TARGET_SIMULATOR_UUID }}" "$APP_PATH"
          
          echo "рџ’¤ 5. OBLIGATORIO: Esperando 60 segundos para enfriar la CPU y estabilizar el simulador..."
          sleep 60

     

      # 7 рџ•µпёЏвЂЌв™‚пёЏ PASO EXTRA: Si el test falla, le metemos Rayos X a la pantalla
      - name: рџ”Ќ Print UI Hierarchy on Failure
        
        run: |
          echo "===================================================="
          echo "рџ¤– REVISANDO QUГ‰ HAY EN LA PANTALLA EN ESTE MOMENTO..."
          echo "===================================================="
          maestro hierarchy

      # 8 рџ”Ќ NUEVO PASO: Si Maestro falla, rescatamos los Logs de choque de Apple
      - name: рџ“‹ Capture Simulator Crash Logs on Failure
        if: always()
        run: |
          mkdir -p simulator_logs
          # 1. Copiamos los reportes de diagnГіstico y crashes nativos de macOS
          cp -R ~/Library/Logs/DiagnosticReports/ simulator_logs/ || true
          # 2. Volcamos los Гєltimos 15 minutos del log del sistema del simulador
          xcrun simctl spawn "${{ env.TARGET_SIMULATOR_UUID }}" log show --last 15m > simulator_logs/simulator_system.log || true

      # 9. Guardar tanto el reporte de Maestro como los logs del sistema
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-and-system-results
          path: |
            report.html
            simulator_logs/