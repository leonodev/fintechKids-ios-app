name: Maestro UI Tests

# 🎯 El disparador: Se ejecuta cada vez que se abre o actualiza una IT hacia main
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  e2e-testing:
    # Obligatorio usar macOS para poder levantar el simulador de Xcode
    runs-on: macos-15

    steps:
      # 1. Clonar el código del repositorio en la máquina virtual
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 Verificar Versiones Exactas de Compilación
      - name: 🔍 Verificar Versiones Exactas de Compilación
        run: |
          echo "=== Versión de macOS ==="
          sw_vers
          echo "=== Versión de Xcode ==="
          xcodebuild -version
          echo "=== Versión de Swift ==="
          swift --version
          echo "=== SDKs Disponibles ==="
          xcodebuild -showsdks

      # 2. Encender el simulador de iOS de forma dinámica y registrar su UUID global
      - name: Boot iOS Simulator
        run: |
          # Buscamos cualquier iPhone disponible en el entorno actual de Xcode
          UUID=$(xcrun simctl list devices available | grep "iPhone" | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' | head -n 1)
          
          if [ -z "$UUID" ]; then
            echo "❌ Error: No se encontró ningún simulador de iPhone disponible en este runner."
            exit 1
          fi
          
          echo "🎯 ¡Simulador detectado! UUID: $UUID"
          xcrun simctl boot "$UUID"
          xcrun simctl bootstatus "$UUID"
          
          # Guardamos el UUID en el entorno de la sesión para usarlo en los siguientes pasos
          echo "TARGET_SIMULATOR_UUID=$UUID" >> $GITHUB_ENV

      # 3. Instalar la herramienta CLI de Maestro
      - name: Install Maestro CLI
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          # Añadimos Maestro a las variables de entorno globales de GitHub
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # 4. Limpieza inicial en Supabase usando tus Secrets seguros
      - name: Clean Supabase Test User
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -s -X DELETE "${SUPABASE_URL}/rest/v1/fhk_family_members?member_name=eq.user_test_e2e" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"

      # 5. Compilar la App e instalarla en el simulador de la CI
      - name: Build and Install App
        run: |
          echo "🔄 1. Descargando paquetes..."
          xcodebuild -resolvePackageDependencies \
                     -project fintechKids.xcodeproj \
                     -scheme FintechKids-Pro \
                     -derivedDataPath build \
                     -disablePackageRepositoryCache
          
          echo "🪓 2. Aplicando parches de compatibilidad..."
          FIREBASE_FILE="build/SourcePackages/checkouts/fintechKids-modulo-firebase-ios/Sources/FHKFirebase/RemoteConfig/FHKRemoteConfigService.swift"
          if [ -f "$FIREBASE_FILE" ]; then
            sed -i '' 's/remoteConfig\.fetchAndActivate()/RemoteConfig.remoteConfig().fetchAndActivate()/g' "$FIREBASE_FILE"
          fi
          
          DS_PATH="build/SourcePackages/checkouts/fintechKids-modulo-designsystem-ios/Sources/FHKDesignSystem"
          if [ -d "$DS_PATH" ]; then
            find "$DS_PATH" -name "*.swift" -type f -exec sed -i '' 's/iOS 26.0/iOS 17.0/g' {} +
          fi
          
          echo "🏗️ 3. Compilando apuntando al ID del simulador encendido..."
          xcodebuild -project fintechKids.xcodeproj \
                     -scheme FintechKids-Pro \
                     -destination "platform=iOS Simulator,id=${{ env.TARGET_SIMULATOR_UUID }}" \
                     -configuration Debug \
                     -derivedDataPath build \
                     -quiet \
                     ARCHS=arm64 \
                     ONLY_ACTIVE_ARCH=YES \
                     COMPRESS_PNG_FILES=NO \
                     ASSETCATALOG_COMPILER_OPTIMIZATION=none \
                     -disablePackageRepositoryCache \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SWIFT_STRICT_CONCURRENCY=minimal \
                     SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
                     IDEBuildOperationMaxNumberOfConcurrentCompileTasks=2 \
                     SWIFT_EXEC_MAX_JOBS=2
          
          echo "🚀 4. Instalando la App en el simulador objetivo..."
          APP_PATH=$(find build -iname "fintechKids.app" | head -n 1)
          xcrun simctl install "${{ env.TARGET_SIMULATOR_UUID }}" "$APP_PATH"
      

      # 6. Ejecución de los flujos de Maestro
      - name: Run Maestro Tests
        run: |
          export MAESTRO_DRIVER_STARTUP_TIMEOUT=300000
          maestro test --format html-detailed --output report.html \
            Maestro/flows/select-language.yaml \
            Maestro/flows/make-login.yaml \
            Maestro/flows/create-new-member.yaml

      # 7. Guardar el reporte HTML en GitHub (Se ejecuta pase lo que pase: Éxito o Fallo)
      - name: Upload Maestro Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-html-report
          path: report.html